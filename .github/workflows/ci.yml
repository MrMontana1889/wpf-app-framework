name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout PropertyTools
        uses: actions/checkout@v4
        with:
          repository: PondPackMan2023/PropertyTools
          path: PropertyTools

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wpf-app-framework

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore wpf-app-framework/wpf-app-framework.slnx

      - name: Build
        run: dotnet build wpf-app-framework/wpf-app-framework.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >-
          dotnet test wpf-app-framework/wpf-app-framework.slnx
          --configuration Release
          --no-build
          --logger "trx"
          --results-directory "TestResults"
          --collect:"XPlat Code Coverage"
          --filter "FullyQualifiedName!~PropertyTools"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        shell: pwsh
        run: >-
          reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"TestResults/CoverageReport"
          -reporttypes:"Cobertura;MarkdownSummaryGithub"

      - name: Add coverage summary to job
        shell: pwsh
        run: Get-Content "TestResults/CoverageReport/SummaryGithub.md" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: TestResults/CoverageReport

